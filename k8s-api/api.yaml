apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: api
  namespace: demo
  labels:
    app: api
spec:
  replicas: 4
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: w9-api:2
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: ERROR_RATE
              value: "0"
            - name: VERSION
              value: "v2"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
  strategy:
    canary:
      steps:
        - setWeight: 25
        - analysis:
            templates:
              - templateName: api-success-rate
            args:
              - name: service-name
                value: api
        - setWeight: 50
        - analysis:
            templates:
              - templateName: api-success-rate
            args:
              - name: service-name
                value: api
        - setWeight: 75
        - analysis:
            templates:
              - templateName: api-success-rate
            args:
              - name: service-name
                value: api
        - setWeight: 100
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: demo
  labels:
    app: api
spec:
  selector:
    app: api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
# Load generator — tạo traffic liên tục để Prometheus có data chấm Analysis
apiVersion: v1
kind: Pod
metadata:
  name: load
  namespace: demo
spec:
  containers:
    - name: load
      image: busybox
      command:
        - sh
        - -c
        - "while true; do wget -qO- http://api.demo.svc.cluster.local:8080/; sleep 1; done"
  restartPolicy: Always
